naftiko: 1.0.0-alpha2
info:
  label: LangSmith — fleet integrations
  description: 'LangSmith — fleet integrations. 6 operations. Lead operation: List integrations. Self-contained Naftiko capability
    covering one Langsmith business surface.'
  tags:
  - Langsmith
  - fleet integrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-fleet-integrations
    baseUri: ''
    description: LangSmith — fleet integrations business capability. Self-contained, no shared references.
    resources:
    - name: v1-fleet-integrations
      path: /v1/fleet/integrations
      operations:
      - name: get
        method: GET
        description: List integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: source
          in: query
          type: string
          description: Filter by source (e.g. langchain, custom)
        - name: page_size
          in: query
          type: integer
          description: Items per page (default 20, max 100)
        - name: cursor
          in: query
          type: string
          description: Opaque pagination cursor
      - name: post
        method: POST
        description: Create a custom integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-fleet-integrations-id
      path: /v1/fleet/integrations/{id}
      operations:
      - name: get
        method: GET
        description: Get an integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Integration id
          required: true
      - name: delete
        method: DELETE
        description: Delete a custom integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Integration id
          required: true
      - name: patch
        method: PATCH
        description: Update a custom integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Integration id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-fleet-integrations-id-auth-methods
      path: /v1/fleet/integrations/{id}/auth-methods
      operations:
      - name: put
        method: PUT
        description: Replace integration auth methods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Integration id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LANGSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: langsmith-fleet-integrations-rest
    port: 8080
    description: REST adapter for LangSmith — fleet integrations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/fleet/integrations
      name: v1-fleet-integrations
      description: REST surface for v1-fleet-integrations.
      operations:
      - method: GET
        name: get
        description: List integrations
        call: langsmith-fleet-integrations.get
        with:
          source: rest.source
          page_size: rest.page_size
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a custom integration
        call: langsmith-fleet-integrations.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/fleet/integrations/{id}
      name: v1-fleet-integrations-id
      description: REST surface for v1-fleet-integrations-id.
      operations:
      - method: GET
        name: get
        description: Get an integration
        call: langsmith-fleet-integrations.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a custom integration
        call: langsmith-fleet-integrations.delete
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Update a custom integration
        call: langsmith-fleet-integrations.patch
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/fleet/integrations/{id}/auth-methods
      name: v1-fleet-integrations-id-auth-methods
      description: REST surface for v1-fleet-integrations-id-auth-methods.
      operations:
      - method: PUT
        name: put
        description: Replace integration auth methods
        call: langsmith-fleet-integrations.put
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langsmith-fleet-integrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangSmith — fleet integrations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-integrations
      description: List integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langsmith-fleet-integrations.get
      with:
        source: tools.source
        page_size: tools.page_size
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: create-custom-integration
      description: Create a custom integration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-fleet-integrations.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-integration
      description: Get an integration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langsmith-fleet-integrations.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-custom-integration
      description: Delete a custom integration
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: langsmith-fleet-integrations.delete
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-custom-integration
      description: Update a custom integration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: langsmith-fleet-integrations.patch
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: replace-integration-auth-methods
      description: Replace integration auth methods
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: langsmith-fleet-integrations.put
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
