naftiko: 1.0.0-alpha2
info:
  label: LangSmith — settings
  description: 'LangSmith — settings. 2 operations. Lead operation: Get Settings. Self-contained Naftiko capability covering
    one Langsmith business surface.'
  tags:
  - Langsmith
  - settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-settings
    baseUri: ''
    description: LangSmith — settings business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-settings
      path: /api/v1/settings
      operations:
      - name: getsettingsapiv1settingsget
        method: GET
        description: Get Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-settings-handle
      path: /api/v1/settings/handle
      operations:
      - name: settenanthandleapiv1settingshandlepost
        method: POST
        description: Set Tenant Handle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LANGSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: langsmith-settings-rest
    port: 8080
    description: REST adapter for LangSmith — settings. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v1/settings
      name: api-v1-settings
      description: REST surface for api-v1-settings.
      operations:
      - method: GET
        name: getsettingsapiv1settingsget
        description: Get Settings
        call: langsmith-settings.getsettingsapiv1settingsget
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/settings/handle
      name: api-v1-settings-handle
      description: REST surface for api-v1-settings-handle.
      operations:
      - method: POST
        name: settenanthandleapiv1settingshandlepost
        description: Set Tenant Handle
        call: langsmith-settings.settenanthandleapiv1settingshandlepost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langsmith-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangSmith — settings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-settings
      description: Get Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langsmith-settings.getsettingsapiv1settingsget
      outputParameters:
      - type: object
        mapping: $.
    - name: set-tenant-handle
      description: Set Tenant Handle
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-settings.settenanthandleapiv1settingshandlepost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
