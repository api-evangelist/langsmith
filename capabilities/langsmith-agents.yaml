naftiko: 1.0.0-alpha2
info:
  label: LangSmith — agents
  description: 'LangSmith — agents. 4 operations. Lead operation: List agents. Self-contained Naftiko capability covering
    one Langsmith business surface.'
  tags:
  - Langsmith
  - agents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-agents
    baseUri: ''
    description: LangSmith — agents business capability. Self-contained, no shared references.
    resources:
    - name: v1-fleet-agents
      path: /v1/fleet/agents
      operations:
      - name: get
        method: GET
        description: List agents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create an agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: string
          description: 'Comma-separated includes. Supported: files'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-fleet-agents-agentID
      path: /v1/fleet/agents/{agentID}
      operations:
      - name: get
        method: GET
        description: Get an agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: agentID
          in: path
          type: string
          description: Agent ID
          required: true
      - name: patch
        method: PATCH
        description: Update an agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: agentID
          in: path
          type: string
          description: Agent ID
          required: true
        - name: include
          in: query
          type: string
          description: 'Comma-separated includes. Supported: files'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LANGSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: langsmith-agents-rest
    port: 8080
    description: REST adapter for LangSmith — agents. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1/fleet/agents
      name: v1-fleet-agents
      description: REST surface for v1-fleet-agents.
      operations:
      - method: GET
        name: get
        description: List agents
        call: langsmith-agents.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create an agent
        call: langsmith-agents.post
        with:
          include: rest.include
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/fleet/agents/{agentid}
      name: v1-fleet-agents-agentid
      description: REST surface for v1-fleet-agents-agentID.
      operations:
      - method: GET
        name: get
        description: Get an agent
        call: langsmith-agents.get
        with:
          agentID: rest.agentID
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Update an agent
        call: langsmith-agents.patch
        with:
          agentID: rest.agentID
          include: rest.include
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langsmith-agents-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangSmith — agents. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-agents
      description: List agents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langsmith-agents.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-agent
      description: Create an agent
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-agents.post
      with:
        include: tools.include
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-agent
      description: Get an agent
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langsmith-agents.get
      with:
        agentID: tools.agentID
      outputParameters:
      - type: object
        mapping: $.
    - name: update-agent
      description: Update an agent
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: langsmith-agents.patch
      with:
        agentID: tools.agentID
        include: tools.include
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
