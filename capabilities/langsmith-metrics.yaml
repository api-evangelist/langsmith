      name: api-v1-metrics-queue-queue-name
      description: REST surface for api-v1-metrics-queue-queue_name.
      operations:
      - method: GET
        name: getqueuemetricsapiv1metricsqueuequeuenameget
        description: Get Queue Metrics
        call: langsmith-metrics.getqueuemetricsapiv1metricsqueuequeuenameget
        with:
          queue_name: rest.queue_name
        outputParameters:
        - type: object
          mapping: $.
