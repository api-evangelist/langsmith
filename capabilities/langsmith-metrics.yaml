      description: Get Queue Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langsmith-metrics.getqueuemetricsapiv1metricsqueuequeuenameget
      with:
        queue_name: tools.queue_name
      outputParameters:
      - type: object
        mapping: $.
