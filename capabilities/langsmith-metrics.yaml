naftiko: 1.0.0-alpha2
info:
  label: LangSmith — metrics
  description: 'LangSmith — metrics. 1 operations. Lead operation: Get Queue Metrics. Self-contained Naftiko capability covering
    one Langsmith business surface.'
  tags:
  - Langsmith
  - metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-metrics
    baseUri: ''
    description: LangSmith — metrics business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-metrics-queue-queue_name
      path: /api/v1/metrics/queue/{queue_name}
      operations:
      - name: getqueuemetricsapiv1metricsqueuequeuenameget
        method: GET
        description: Get Queue Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
