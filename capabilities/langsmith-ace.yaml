naftiko: 1.0.0-alpha2
info:
  label: LangSmith — ace
  description: 'LangSmith — ace. 1 operations. Lead operation: Execute. Self-contained Naftiko capability covering one Langsmith
    business surface.'
  tags:
  - Langsmith
  - ace
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-ace
    baseUri: ''
    description: LangSmith — ace business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-ace-execute
      path: /api/v1/ace/execute
      operations:
      - name: executeapiv1aceexecutepost
        method: POST
        description: Execute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LANGSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: langsmith-ace-rest
    port: 8080
    description: REST adapter for LangSmith — ace. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/v1/ace/execute
      name: api-v1-ace-execute
      description: REST surface for api-v1-ace-execute.
      operations:
      - method: POST
        name: executeapiv1aceexecutepost
        description: Execute
        call: langsmith-ace.executeapiv1aceexecutepost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langsmith-ace-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangSmith — ace. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: execute
      description: Execute
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-ace.executeapiv1aceexecutepost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
