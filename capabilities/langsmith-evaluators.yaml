naftiko: 1.0.0-alpha2
info:
  label: LangSmith — evaluators
  description: 'LangSmith — evaluators. 6 operations. Lead operation: List evaluators. Self-contained Naftiko capability covering
    one Langsmith business surface.'
  tags:
  - Langsmith
  - evaluators
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-evaluators
    baseUri: ''
    description: LangSmith — evaluators business capability. Self-contained, no shared references.
    resources:
    - name: v1-platform-evaluators
      path: /v1/platform/evaluators
      operations:
      - name: get
        method: GET
        description: List evaluators
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter by evaluator type
        - name: name_contains
          in: query
          type: string
          description: Filter by name substring (also searches creator names)
        - name: tag_value_id
          in: query
          type: array
          description: Filter by tag value IDs
        - name: feedback_key
          in: query
          type: string
          description: Filter by feedback key
        - name: resource_id
          in: query
          type: array
          description: Filter by resource IDs
        - name: sort_by
          in: query
          type: string
          description: Field to sort by
        - name: sort_by_desc
          in: query
          type: boolean
          description: Sort in descending order
        - name: limit
          in: query
          type: integer
          description: Maximum number of results (1-100)
        - name: offset
          in: query
          type: integer
          description: Offset for pagination
      - name: post
        method: POST
        description: Create evaluator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: delete
        method: DELETE
        description: Bulk delete evaluators
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: evaluator_ids
          in: query
          type: array
          description: Evaluator IDs to delete
          required: true
        - name: delete_run_rules
          in: query
          type: boolean
          description: When true, delete all run rules for this evaluator before deleting the evaluator
    - name: v1-platform-evaluators-evaluator_id
      path: /v1/platform/evaluators/{evaluator_id}
      operations:
      - name: get
        method: GET
        description: Get evaluator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: evaluator_id
          in: path
          type: string
          description: Evaluator ID
          required: true
      - name: delete
        method: DELETE
        description: Delete evaluator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: evaluator_id
          in: path
          type: string
          description: Evaluator ID
          required: true
        - name: delete_run_rules
          in: query
          type: boolean
          description: When true, delete all run rules for this evaluator before deleting the evaluator
      - name: patch
        method: PATCH
        description: Update evaluator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: evaluator_id
          in: path
          type: string
          description: Evaluator ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LANGSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: langsmith-evaluators-rest
    port: 8080
    description: REST adapter for LangSmith — evaluators. One Spectral-compliant resource per consumed operation, prefixed
