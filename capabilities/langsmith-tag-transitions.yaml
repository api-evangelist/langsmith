naftiko: 1.0.0-alpha2
info:
  label: LangSmith — tag-transitions
  description: 'LangSmith — tag-transitions. 1 operations. Lead operation: Get tag transition history. Self-contained Naftiko
    capability covering one Langsmith business surface.'
  tags:
  - Langsmith
  - tag-transitions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-tag-transitions
    baseUri: ''
    description: LangSmith — tag-transitions business capability. Self-contained, no shared references.
    resources:
    - name: repos-owner-repo-tags-tag_name-history
      path: /repos/{owner}/{repo}/tags/{tag_name}/history
      operations:
      - name: get
        method: GET
        description: Get tag transition history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: Repository owner (tenant handle)
          required: true
        - name: repo
          in: path
          type: string
          description: Repository handle
          required: true
        - name: tag_name
          in: path
          type: string
          description: Tag name
          required: true
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.LANGSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: langsmith-tag-transitions-rest
    port: 8080
    description: REST adapter for LangSmith — tag-transitions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repos/{owner}/{repo}/tags/{tag-name}/history
      name: repos-owner-repo-tags-tag-name-history
      description: REST surface for repos-owner-repo-tags-tag_name-history.
      operations:
      - method: GET
        name: get
        description: Get tag transition history
        call: langsmith-tag-transitions.get
        with:
          owner: rest.owner
          repo: rest.repo
          tag_name: rest.tag_name
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langsmith-tag-transitions-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangSmith — tag-transitions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-tag-transition-history
      description: Get tag transition history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langsmith-tag-transitions.get
      with:
        owner: tools.owner
        repo: tools.repo
        tag_name: tools.tag_name
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
