        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Max results (max 100)
        - name: start_time
          in: query
          type: string
          description: Start of cost window (ISO8601)
          required: true
        - name: end_time
          in: query
          type: string
          description: End of cost window (ISO8601)
          required: true
        - name: sort_by
          in: query
          type: string
          description: Sort field (cost, runs, last_used, first_used)
        - name: sort_order
          in: query
