naftiko: 1.0.0-alpha2
info:
  label: LangSmith — fleet_webhooks
  description: 'LangSmith — fleet_webhooks. 1 operations. Lead operation: Run a fleet webhook. Self-contained Naftiko capability
    covering one Langsmith business surface.'
  tags:
  - Langsmith
  - fleet_webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-fleet-webhooks
    baseUri: ''
    description: LangSmith — fleet_webhooks business capability. Self-contained, no shared references.
    resources:
    - name: v1-platform-fleet-webhooks-webhook_id-run
      path: /v1/platform/fleet-webhooks/{webhook_id}/run
      operations:
      - name: post
        method: POST
        description: Run a fleet webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhook_id
          in: path
          type: string
          description: Webhook UUID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LANGSMITH_API_KEY}}'
  exposes:
  - type: rest
    namespace: langsmith-fleet-webhooks-rest
    port: 8080
    description: REST adapter for LangSmith — fleet_webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/platform/fleet-webhooks/{webhook-id}/run
      name: v1-platform-fleet-webhooks-webhook-id-run
      description: REST surface for v1-platform-fleet-webhooks-webhook_id-run.
      operations:
      - method: POST
        name: post
        description: Run a fleet webhook
        call: langsmith-fleet-webhooks.post
        with:
          webhook_id: rest.webhook_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langsmith-fleet-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangSmith — fleet_webhooks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: run-fleet-webhook
      description: Run a fleet webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-fleet-webhooks.post
      with:
        webhook_id: tools.webhook_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
