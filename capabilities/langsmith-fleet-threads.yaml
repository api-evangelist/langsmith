      with:
        threadID: tools.threadID
      outputParameters:
      - type: object
        mapping: $.
    - name: resolve-interrupted-thread
      description: Resolve an interrupted thread
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-fleet-threads.post
      with:
        threadID: tools.threadID
      outputParameters:
      - type: object
        mapping: $.
    - name: create-thread-run
      description: Create thread run
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-fleet-threads.post
      with:
        threadID: tools.threadID
      outputParameters:
      - type: object
        mapping: $.
