    port: 9090
    transport: http
    description: MCP adapter for LangSmith — fleet threads. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-thread
      description: Create thread
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langsmith-fleet-threads.post
      outputParameters:
      - type: object
        mapping: $.
    - name: search-threads
