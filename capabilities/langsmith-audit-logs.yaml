      description: REST surface for api-v1-audit-logs.
      operations:
      - method: GET
        name: getauditlogsapiv1auditlogsget
        description: Get Audit Logs
        call: langsmith-audit-logs.getauditlogsapiv1auditlogsget
        with:
          limit: rest.limit
          cursor: rest.cursor
          workspace_id: rest.workspace_id
          start_time: rest.start_time
          end_time: rest.end_time
          operations: rest.operations
        outputParameters:
        - type: object
