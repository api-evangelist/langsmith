naftiko: 1.0.0-alpha2
info:
  label: LangSmith — audit-logs
  description: 'LangSmith — audit-logs. 1 operations. Lead operation: Get Audit Logs. Self-contained Naftiko capability covering
    one Langsmith business surface.'
  tags:
  - Langsmith
  - audit-logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGSMITH_API_KEY: LANGSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: langsmith-audit-logs
    baseUri: ''
    description: LangSmith — audit-logs business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-audit-logs
      path: /api/v1/audit-logs
      operations:
      - name: getauditlogsapiv1auditlogsget
        method: GET
        description: Get Audit Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of items to return
        - name: cursor
          in: query
          type: string
          description: Cursor for pagination (base64-encoded JSON string)
        - name: workspace_id
          in: query
          type: string
          description: Filter by workspace ID
        - name: start_time
          in: query
          type: string
          description: Start datetime (inclusive) in ISO 8601 format
          required: true
        - name: end_time
          in: query
          type: string
          description: End datetime (inclusive) in ISO 8601 format
