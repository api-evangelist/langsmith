      - name: session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Session Id
      - name: start_time
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Time
      - name: exclude_s3_stored_attributes
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Exclude S3 Stored Attributes
      - name: exclude_serialized
        in: query
