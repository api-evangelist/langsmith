openapi: 3.1.0
info:
  title: LangSmith access_policies run API
  description: 'The LangSmith API is used to programmatically create and manage LangSmith resources.


    ## Host

    https://api.smith.langchain.com


    ## Authentication

    To authenticate with the LangSmith API, set the `X-Api-Key` header

    to a valid [LangSmith API key](https://docs.langchain.com/langsmith/create-account-api-key#create-an-api-key).


    '
  version: 0.1.0
servers:
- url: /
tags:
- name: run
paths:
  /api/v1/runs/rules:
    get:
      tags:
      - run
      summary: List Rules
      description: List all run rules.
      operationId: list_rules_api_v1_runs_rules_get
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: dataset_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Dataset Id
      - name: session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Session Id
      - name: type
        in: query
        required: false
        schema:
          anyOf:
          - enum:
            - session
            - dataset
            type: string
          - type: 'null'
          title: Type
      - name: name_contains
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Name Contains
      - name: id
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
              format: uuid
          - type: 'null'
          title: Id
      - name: evaluator_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Evaluator Id
      - name: tag_value_id
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
              format: uuid
          - type: 'null'
          title: Tag Value Id
      - name: include_backfill_progress
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Backfill Progress
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunRulesSchema'
                title: Response List Rules Api V1 Runs Rules Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - run
      summary: Create Rule
      description: Create a new run rule.
      operationId: create_rule_api_v1_runs_rules_post
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRulesCreateSchema'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunRulesSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runs/rules/validate:
    post:
      tags:
      - run
      summary: Validate Rule
      description: 'Validate a rule by executing it with test data without creating a saved rule.


        This endpoint allows testing LLM-as-judge evaluators before saving them. It accepts

        a rule configuration (same as rule creation) and test data, executes the evaluator,

        and returns the evaluation results in the same format as batch_invoke_evaluator.


        Only LLM-as-judge rules (evaluators) are supported. Code evaluators are not allowed.


        The evaluator execution traces are written to the database (in the "evaluators"

        project), which allows users to see the evaluator execution history.'
      operationId: validate_rule_api_v1_runs_rules_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRulesValidateSchema'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  additionalProperties: true
                  type: object
                type: array
                title: Response Validate Rule Api V1 Runs Rules Validate Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
  /api/v1/runs/rules/{rule_id}:
    patch:
      tags:
      - run
      summary: Update Rule
      description: Update a run rule.
      operationId: update_rule_api_v1_runs_rules__rule_id__patch
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Rule Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRulesUpdateSchema'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunRulesSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - run
      summary: Delete Rule
      description: Delete a run rule.
      operationId: delete_rule_api_v1_runs_rules__rule_id__delete
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runs/threads/{thread_id}:
    get:
      tags:
      - run
      summary: Thread Preview
      description: Get preview of a thread.
      operationId: thread_preview_api_v1_runs_threads__thread_id__get
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          title: Thread Id
      - name: session_id
        in: query
        required: true
        schema:
          type: string
          format: uuid
          title: Session Id
      - name: select
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/ThreadMessagesFormatType'
          - type: 'null'
          title: Select
      - name: variables
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: Variables
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadPreviewResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runs/rules/{rule_id}/logs:
    get:
      tags:
      - run
      summary: List Rule Logs
      description: List logs for a particular rule
      operationId: list_rule_logs_api_v1_runs_rules__rule_id__logs_get
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Rule Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1440
          minimum: 1
          default: 150
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: start_time
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Time
      - name: end_time
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Time
      - name: session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RuleLogSchema'
                title: Response List Rule Logs Api V1 Runs Rules  Rule Id  Logs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runs/rules/{rule_id}/logs/v2:
    get:
      tags:
      - run
      summary: List Rule Logs V2
      description: 'List logs for a particular rule with cursor-based pagination.


        This endpoint handles S3-stored outcomes correctly by using run_outcomes_count

        to predict batch sizes and avoid over-fetching.'
      operationId: list_rule_logs_v2_api_v1_runs_rules__rule_id__logs_v2_get
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Rule Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1440
          minimum: 1
          default: 150
          title: Limit
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: backfill
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Backfill
      - name: start_time
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Time
      - name: end_time
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Time
      - name: session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Session Id
