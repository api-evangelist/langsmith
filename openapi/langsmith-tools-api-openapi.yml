      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tools.UpdateToolPayload'
components:
  schemas:
    tools.Tool:
      type: object
      properties:
        created_at:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        handle:
          type: string
        id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        name:
          type: string
        parameters:
          type: object
          additionalProperties: true
        returns:
          type: object
          additionalProperties: true
        tenant_id:
          type: string
        updated_at:
          type: string
    tools.ErrorResponse:
      type: object
      properties:
        error:
          description: Error message
          type: string
    tools.ListToolsResponse:
      type: object
      properties:
        next_offset:
          type: integer
        tools:
          type: array
          items:
            $ref: '#/components/schemas/tools.Tool'
        total:
          type: integer
    tools.CreateToolPayload:
      type: object
      required:
      - description
      - handle
      - name
      - parameters
      properties:
        description:
          type: string
        enabled:
          type: boolean
        handle:
          type: string
        metadata:
          type: object
          additionalProperties: true
        name:
          type: string
        parameters:
          type: object
          additionalProperties: true
        returns:
          type: object
          additionalProperties: true
    tools.UpdateToolPayload:
      type: object
      properties:
        description:
          type: string
        enabled:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
        name:
          type: string
        parameters:
          type: object
          additionalProperties: true
        returns:
          type: object
          additionalProperties: true
  securitySchemes:
    API Key:
      type: apiKey
      in: header
      name: X-API-Key
    Tenant ID:
      type: apiKey
      in: header
      name: X-Tenant-Id
    Bearer Auth:
      type: http
      description: Bearer tokens are used to authenticate from the UI. Must also specify x-tenant-id or x-organization-id (for org scoped apis).
      scheme: bearer
    Organization ID:
      type: apiKey
      in: header
      name: X-Organization-Id
