  /v1/platform/orgs/current/members:
    get:
      security:
      - API Key: []
      - Organization ID: []
      - Bearer Auth: []
      description: Returns a paginated list of org members (active and pending) enriched with workspace memberships.
      tags:
      - orgs
      summary: List org members with workspace roles
      parameters:
      - description: Page size (default 50, max 500)
        name: limit
        in: query
        schema:
          type: integer
          title: Limit
      - description: Page offset (default 0)
        name: offset
        in: query
        schema:
          type: integer
          title: Offset
      - description: 'Filter: true = only active members; false = only pending members'
        name: active_is
        in: query
        schema:
          type: boolean
          title: Active Is
      - description: 'Filter: true = only pending members; false = only active members'
        name: pending_is
        in: query
        schema:
          type: boolean
          title: Pending Is
      - description: Glob filter on display name; use * as wildcard (repeatable, matches any)
        name: name_like
        in: query
        style: form
        explode: true
        schema:
          items:
            type: string
          type: array
          title: Name Like
      - description: Glob filter on email; use * as wildcard (repeatable, matches any)
        name: email_like
        in: query
        style: form
        explode: true
        schema:
          items:
            type: string
          type: array
          title: Email Like
      - description: Glob filter on workspace name or ID; use * as wildcard (repeatable, matches any)
        name: workspace_name_like
        in: query
        style: form
        explode: true
        schema:
          items:
            type: string
          type: array
          title: Workspace Name Like
      - description: Glob filter on organization role name; use * as wildcard (repeatable, matches any)
        name: organization_role_like
        in: query
        style: form
        explode: true
        schema:
          items:
            type: string
          type: array
          title: Organization Role Like
      - description: Glob filter on workspace role name; use * as wildcard (repeatable, matches any)
        name: workspace_role_like
        in: query
        style: form
        explode: true
        schema:
          items:
            type: string
          type: array
          title: Workspace Role Like
      responses:
        '200':
          description: Org members
          headers:
            X-Members-List-All-Workspaces:
              description: true if caller has organization:manage
              schema:
                type: string
            X-Pagination-Total:
              description: Total number of matching members
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/orgs.OrgMemberEnriched'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
components:
  schemas:
    GranularUsageResponse:
      properties:
        stride:
          $ref: '#/components/schemas/GranularUsageStride'
        usage:
          items:
            $ref: '#/components/schemas/GranularUsageRecord'
          type: array
          title: Usage
      type: object
      required:
      - stride
      - usage
      title: GranularUsageResponse
      description: Response for granular usage query.
    OrganizationBillingInfo:
      properties:
        id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Id
        display_name:
          type: string
          title: Display Name
        config:
          $ref: '#/components/schemas/OrganizationConfig'
        connected_to_stripe:
          type: boolean
          title: Connected To Stripe
        connected_to_metronome:
          type: boolean
          title: Connected To Metronome
        is_personal:
          type: boolean
          title: Is Personal
        tier:
          anyOf:
          - $ref: '#/components/schemas/PaymentPlanTier'
          - type: 'null'
        payment_method:
          anyOf:
          - $ref: '#/components/schemas/StripePaymentMethodInfo'
          - type: 'null'
        end_of_billing_period:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Of Billing Period
        current_plan:
          anyOf:
          - $ref: '#/components/schemas/CustomerVisiblePlanInfo'
          - type: 'null'
        upcoming_plan:
          anyOf:
          - $ref: '#/components/schemas/CustomerVisiblePlanInfo'
          - type: 'null'
        reached_max_workspaces:
          type: boolean
          title: Reached Max Workspaces
          default: false
        disabled:
          type: boolean
          title: Disabled
          default: false
        default_sso_provision:
          type: boolean
          title: Default Sso Provision
          default: false
        plus_plan_transition:
          anyOf:
          - $ref: '#/components/schemas/PlusPlanTransitionInfo'
          - type: 'null'
      type: object
      required:
      - display_name
      - config
      - connected_to_stripe
      - connected_to_metronome
      - is_personal
      title: OrganizationBillingInfo
      description: Information about an organization's billing configuration.
    StripeCustomerAddress:
      properties:
        line1:
          type: string
          title: Line1
        line2:
          anyOf:
          - type: string
          - type: 'null'
          title: Line2
        city:
          type: string
          title: City
        state:
          anyOf:
          - type: string
          - type: 'null'
          title: State
        postal_code:
          type: string
          title: Postal Code
        country:
          type: string
          title: Country
      type: object
      required:
      - line1
      - city
      - postal_code
      - country
      title: StripeCustomerAddress
      description: Stripe customer address.
    orgs.OrgMemberEnriched:
      type: object
      properties:
        avatar_url:
          type: string
        created_at:
          type: string
        display_name:
          description: auth-resolved display name
          type: string
        email:
          type: string
        id:
          description: identity_id or pending_identity_id
          type: string
        is_disabled:
          description: user disabled
          type: boolean
        is_pending:
          description: true for pending invitations
          type: boolean
        linked_login_methods:
          type: array
          items:
            $ref: '#/components/schemas/orgs.LinkedLoginMethod'
        ls_user_id:
          description: nil for pending members
          type: string
        role_id:
          description: org role
          type: string
        role_name:
          description: org role name
          type: string
        scim_groups:
          type: array
          items:
            $ref: '#/components/schemas/orgs.SCIMGroup'
        workspace_memberships:
          type: array
          items:
            $ref: '#/components/schemas/orgs.WorkspaceMembership'
    PendingIdentity:
      properties:
        email:
          type: string
          title: Email
        read_only:
          type: boolean
          title: Read Only
          default: false
          deprecated: true
        role_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Role Id
        workspace_ids:
          anyOf:
          - items:
              type: string
              format: uuid
            type: array
          - type: 'null'
          title: Workspace Ids
        workspace_role_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Workspace Role Id
        password:
          anyOf:
          - type: string
          - type: 'null'
          title: Password
        full_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Full Name
        access_scope:
          $ref: '#/components/schemas/AccessScope'
          default: workspace
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: User Id
        tenant_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Tenant Id
        organization_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Organization Id
        created_at:
          type: string
          format: date-time
          title: Created At
        role_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Role Name
        org_role_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Org Role Id
        org_role_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Org Role Name
      type: object
      required:
      - email
      - id
      - created_at
      title: PendingIdentity
    OrganizationMembers:
      properties:
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        members:
          items:
            $ref: '#/components/schemas/OrgMemberIdentity'
