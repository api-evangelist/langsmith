      - Bearer Auth: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: emails
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          default: []
          title: Emails
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search query for email or name
          title: Q
        description: Search query for email or name
      - name: sort_by_desc
        in: query
        required: false
        schema:
          type: boolean
          description: Sort in descending order
          default: true
          title: Sort By Desc
        description: Sort in descending order
      - name: ls_user_ids
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
          default: []
          title: Ls User Ids
      - name: user_ids
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
          deprecated: true
          title: User Ids
        deprecated: true
      - name: is_disabled
