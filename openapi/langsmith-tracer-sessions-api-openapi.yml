          type: string
          format: uuid
          title: Session Id
      - name: metadata_keys
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: Metadata Keys
      - name: start_time
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Time
      - name: k
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 10
          title: K
      - name: root_runs_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Root Runs Only
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootModel_Dict_str__list_str___'
        '422':
          description: Validation Error
          content:
