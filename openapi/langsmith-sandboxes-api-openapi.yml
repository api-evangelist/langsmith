openapi: 3.1.0
info:
  title: LangSmith access_policies sandboxes API
  description: 'The LangSmith API is used to programmatically create and manage LangSmith resources.


    ## Host

    https://api.smith.langchain.com


    ## Authentication

    To authenticate with the LangSmith API, set the `X-Api-Key` header

    to a valid [LangSmith API key](https://docs.langchain.com/langsmith/create-account-api-key#create-an-api-key).


    '
  version: 0.1.0
servers:
- url: /
tags:
- name: sandboxes
paths:
  /auth/sandbox-access:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Combines authn + per-sandbox authz for runtime access. Returns the caller's PublicAuthInfo on allow (HTTP 200) or a 403 with the deny reason on deny.
      tags:
      - sandboxes
      summary: Get sandbox access decision
      parameters:
      - description: Sandbox claim UUID
        name: sandbox_id
        in: query
        required: true
        schema:
          type: string
          title: Sandbox Id
      - description: 'Runtime action: exec | file | tunnel | proxy'
        name: action
        in: query
        required: true
        schema:
          type: string
          title: Action
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authn.PublicAuthInfo'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: 'sandbox access denied: <reason>'
          content:
            application/json:
              schema:
                type: string
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
  /v2/sandboxes/boxes:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      - X-Service-Key: []
      description: List sandbox claims for the authenticated tenant, with optional filtering, sorting, and pagination.
      tags:
      - sandboxes
      summary: List sandbox claims
      parameters:
      - description: Maximum number of results
        name: limit
        in: query
        schema:
          type: integer
          default: 50
          title: Limit
      - description: Pagination offset
        name: offset
        in: query
        schema:
          type: integer
          default: 0
          title: Offset
      - description: Filter by name substring
        name: name_contains
        in: query
        schema:
          type: string
          title: Name Contains
      - description: Filter by status (provisioning, ready, failed, stopped, deleting)
        name: status
        in: query
        schema:
          type: string
          title: Status
      - description: Sort column (name, status, created_at)
        name: sort_by
        in: query
        schema:
          type: string
          default: created_at
          title: Sort By
      - description: Sort direction (asc, desc)
        name: sort_direction
        in: query
        schema:
          type: string
          default: desc
          title: Sort Direction
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ClaimListResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
    post:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      - X-Service-Key: []
      description: Create a new sandbox from a snapshot. The snapshot may be identified by `snapshot_id` (UUID) or by `snapshot_name` (tenant-scoped unique name); exactly one must be set.
      tags:
      - sandboxes
      summary: Create a sandbox claim
      parameters: []
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ClaimResponse'
        '400':
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '409':
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '429':
          description: Quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Sandbox creation failed or internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '504':
          description: Sandbox did not become ready in time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sandboxes.CreateClaimPayload'
  /v2/sandboxes/boxes/batch-delete:
    post:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Delete multiple sandbox claims by name or UUID in a single request.
      tags:
      - sandboxes
      summary: Batch delete sandbox claims
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.BatchDeleteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sandboxes.BatchDeleteRequest'
  /v2/sandboxes/boxes/{name}:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      - X-Service-Key: []
      description: Retrieve a sandbox claim by name. Stale provisioning claims are auto-failed.
      tags:
      - sandboxes
      summary: Get a sandbox claim
      parameters:
      - description: Sandbox claim display name
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ClaimResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
    delete:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      - X-Service-Key: []
      description: Delete a sandbox claim by name or UUID. Tears down the sandbox runtime and removes the DB record.
      tags:
      - sandboxes
      summary: Delete a sandbox claim
      parameters:
      - description: Sandbox claim display name or UUID
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: No content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
    patch:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      - X-Service-Key: []
      description: Update a sandbox claim's display name. The name must be unique within the tenant.
      tags:
      - sandboxes
      summary: Update a sandbox claim
      parameters:
      - description: Current sandbox claim display name
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ClaimResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '409':
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sandboxes.UpdateClaimPayload'
  /v2/sandboxes/boxes/{name}/service-url:
    post:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Create a short-lived JWT for accessing an HTTP service running on a specific port inside a sandbox. Returns a browser_url (sets auth cookie via redirect), a service_url (for use with the X-Langsmith-Sandbox-Service-Token header), the raw token, and its expiry.
      tags:
      - sandboxes
      summary: Generate a service access token
      parameters:
      - description: Sandbox claim display name
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ServiceURLResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sandboxes.ServiceURLPayload'
  /v2/sandboxes/boxes/{name}/snapshot:
    post:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Create a snapshot by capturing the current state of a sandbox or promoting an existing checkpoint.
      tags:
      - sandboxes
      summary: Capture a snapshot from a sandbox
      parameters:
      - description: Sandbox claim display name
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.SnapshotResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sandboxes.CaptureSnapshotPayload'
  /v2/sandboxes/boxes/{name}/start:
    post:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Start a stopped or failed sandbox. This endpoint is not idempotent.
      tags:
      - sandboxes
      summary: Start a sandbox
      parameters:
      - description: Sandbox claim display name
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ClaimResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
  /v2/sandboxes/boxes/{name}/status:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      - X-Service-Key: []
      description: Retrieve the lightweight status of a sandbox claim for polling.
      tags:
      - sandboxes
      summary: Get sandbox claim status
      parameters:
      - description: Sandbox claim display name
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ClaimStatusResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
  /v2/sandboxes/boxes/{name}/stop:
    post:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Stop a ready sandbox. This endpoint is not idempotent; the filesystem is preserved for later restart.
      tags:
      - sandboxes
      summary: Stop a sandbox
      parameters:
      - description: Sandbox claim display name
        name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Sandbox stopped
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
  /v2/sandboxes/snapshots:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: List sandbox snapshots for the authenticated tenant, with optional filtering, sorting, and pagination.
      tags:
      - sandboxes
      summary: List snapshots
      parameters:
      - description: Maximum number of results
        name: limit
        in: query
        schema:
          type: integer
          default: 50
          title: Limit
      - description: Pagination offset
        name: offset
        in: query
        schema:
          type: integer
          default: 0
          title: Offset
      - description: Filter by name substring
        name: name_contains
        in: query
        schema:
          type: string
          title: Name Contains
      - description: Filter by status (building, ready, failed, deleting)
        name: status
        in: query
        schema:
          type: string
          title: Status
      - description: Sort column (name, status, created_at)
        name: sort_by
        in: query
        schema:
          type: string
          default: created_at
          title: Sort By
      - description: Sort direction (asc, desc)
        name: sort_direction
        in: query
        schema:
          type: string
          default: desc
          title: Sort Direction
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.SnapshotListResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
    post:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Create a snapshot from a Docker image (async build).
      tags:
      - sandboxes
      summary: Create a snapshot
      parameters: []
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.SnapshotResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sandboxes.CreateSnapshotPayload'
  /v2/sandboxes/snapshots/{snapshot_id}:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Get a sandbox snapshot by ID.
      tags:
      - sandboxes
      summary: Get a snapshot
      parameters:
      - description: Snapshot UUID
        name: snapshot_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.SnapshotResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
    delete:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Delete a snapshot by ID. The underlying storage is reclaimed asynchronously.
      tags:
      - sandboxes
      summary: Delete a snapshot
      parameters:
      - description: Snapshot UUID
        name: snapshot_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Snapshot deleted
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
  /v2/sandboxes/usage:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      - X-Service-Key: []
      description: Get current sandbox resource usage and quota limits for the workspace
      tags:
      - sandboxes
      summary: Get sandbox resource usage
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.UsageResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sandboxes.ErrorResponse'
      parameters: []
components:
  schemas:
    sandboxes.ClaimListResponse:
      type: object
      properties:
        offset:
          type: integer
        sandboxes:
          type: array
          items:
            $ref: '#/components/schemas/sandboxes.ClaimResponse'
    sandboxes.ProxyRule:
      type: object
      required:
      - match_hosts
      - name
      properties:
        enabled:
          type: boolean
        headers:
          type: array
          items:
            $ref: '#/components/schemas/sandboxes.ProxyHeader'
        match_hosts:
          type: array
          minItems: 1
          items:
            type: string
        match_paths:
          type: array
          items:
            type: string
        name:
          type: string
    sandboxes.CaptureSnapshotPayload:
      type: object
      required:
      - name
      properties:
        checkpoint:
          description: if omitted, creates a fresh checkpoint from the running VM
          type: string
        name:
          type: string
    sandboxes.UpdateClaimPayload:
      type: object
      properties:
        delete_after_stop_seconds:
          type: integer
        fs_capacity_bytes:
          type: integer
        idle_ttl_seconds:
          type: integer
        mem_bytes:
          type: integer
        name:
          type: string
        proxy_config:
          $ref: '#/components/schemas/sandboxes.ProxyConfig'
        vcpus:
          type: integer
    sandboxes.ProxyHeader:
      type: object
      required:
      - name
      - type
      properties:
        is_set:
          type: boolean
        name:
          type: string
        type:
          enum:
          - plaintext
          - opaque
          - workspace_secret
          allOf:
          - $ref: '#/components/schemas/sandboxes.HeaderType'
        value:
          type: string
    sandboxes.BatchDeleteResponse:
      type: object
      properties:
        deleted:
          type: array
          items:
            type: string
        skipped:
          type: array
          items:
            $ref: '#/components/schemas/sandboxes.BatchDeleteSkipped'
    sandboxes.BatchDeleteSkipped:
      type: object
      properties:
        name:
          type: string
        reason:
          type: string
    sandboxes.ServiceURLPayload:
      type: object
      properties:
        expires_in_seconds:
          type: integer
        port:
          type: integer
    sandboxes.ClaimStatusResponse:
      type: object
      properties:
        status:
          type: string
        status_message:
          type: string
    sandboxes.Callback:
      type: object
      required:
      - match_hosts
      - ttl_seconds
      - url
      properties:
        full_request:
          type: boolean
        match_hosts:
          type: array
          minItems: 1
          items:
            type: string
        request_headers:
          type: array
          items:
            $ref: '#/components/schemas/sandboxes.ProxyHeader'
        ttl_seconds:
          type: integer
          maximum: 3600
          minimum: 60
        url:
          type: string
    sandboxes.AccessControl:
      type: object
      properties:
        allow_list:
          type: array
          items:
            type: string
        deny_list:
          type: array
          items:
            type: string
    sandboxes.ProxyConfig:
      type: object
      properties:
        access_control:
          $ref: '#/components/schemas/sandboxes.AccessControl'
        callbacks:
          type: array
          items:
            $ref: '#/components/schemas/sandboxes.Callback'
        no_proxy:
          type: array
          items:
            type: string
        rules:
          type: array
          items:
