          application/json:
            schema:
              $ref: '#/components/schemas/ExportAnnotationQueueRunsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/annotation-queues/{queue_id}/run/{index}:
    get:
      tags:
      - annotation-queues
      summary: Get Run From Annotation Queue
      description: Get a run from an annotation queue
      operationId: get_run_from_annotation_queue_api_v1_annotation_queues__queue_id__run__index__get
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: queue_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Queue Id
      - name: index
        in: path
        required: true
        schema:
          type: integer
          title: Index
      - name: include_extra
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Extra
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSchemaWithAnnotationQueueInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/annotation-queues/{run_id}/queues:
    get:
      tags:
      - annotation-queues
      summary: Get Annotation Queues For Run
      operationId: get_annotation_queues_for_run_api_v1_annotation_queues__run_id__queues_get
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnnotationQueueSchema'
                title: Response Get Annotation Queues For Run Api V1 Annotation Queues  Run Id  Queues Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
