          type: string
          format: uuid
          title: Queue Id
      - name: queue_run_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Queue Run Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationQueueRunUpdateSchema'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - annotation-queues
      summary: Delete Run From Annotation Queue
      operationId: delete_run_from_annotation_queue_api_v1_annotation_queues__queue_id__runs__queue_run_id__delete
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: queue_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Queue Id
      - name: queue_run_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Queue Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/annotation-queues/{queue_id}/runs/delete:
    post:
      tags:
      - annotation-queues
      summary: Delete Runs From Annotation Queue
      operationId: delete_runs_from_annotation_queue_api_v1_annotation_queues__queue_id__runs_delete_post
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: queue_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Queue Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationQueueBulkDeleteRunsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/annotation-queues/{queue_id}/total_size:
    get:
      tags:
      - annotation-queues
      summary: Get Total Size From Annotation Queue
      operationId: get_total_size_from_annotation_queue_api_v1_annotation_queues__queue_id__total_size_get
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
