components:
  schemas:
    CustomChartsResponse:
      properties:
        sections:
          items:
            $ref: '#/components/schemas/CustomChartsSection'
          type: array
          title: Sections
      type: object
      required:
      - sections
      title: CustomChartsResponse
    CustomChartsRequest:
      properties:
        timezone:
          type: string
          title: Timezone
          default: UTC
        start_time:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Time
        end_time:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Time
        stride:
          $ref: '#/components/schemas/TimedeltaInput'
          default:
            days: 0
            hours: 0
            minutes: 15
        omit_data:
          type: boolean
          title: Omit Data
          default: false
        after_index:
          anyOf:
          - type: integer
          - type: 'null'
          title: After Index
        tag_value_id:
          anyOf:
          - items:
              type: string
              format: uuid
            type: array
          - type: 'null'
          title: Tag Value Id
      type: object
      title: CustomChartsRequest
    CustomChartType:
      type: string
      enum:
      - line
      - bar
      title: CustomChartType
      description: Enum for custom chart types.
    TimedeltaInput:
      properties:
        days:
          type: integer
          title: Days
          default: 0
        hours:
          type: integer
          title: Hours
          default: 0
        minutes:
          type: integer
          title: Minutes
          default: 0
      type: object
      title: TimedeltaInput
      description: Timedelta input.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    CustomChartSeries:
      properties:
        name:
          type: string
          title: Name
        filters:
          anyOf:
          - $ref: '#/components/schemas/CustomChartSeriesFilters'
          - type: 'null'
        metric:
          $ref: '#/components/schemas/CustomChartMetric'
        feedback_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Feedback Key
        workspace_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Workspace Id
        project_metric:
          anyOf:
          - $ref: '#/components/schemas/HostProjectChartMetric'
          - type: 'null'
        id:
          anyOf:
          - type: string
            format: uuid
          - type: string
          title: Id
        group_by:
          anyOf:
          - $ref: '#/components/schemas/RunStatsGroupBySeriesResponse'
          - type: 'null'
      type: object
      required:
      - name
      - metric
      - id
      title: CustomChartSeries
    CustomChartsSectionsCloneRequest:
      properties:
        section_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Section Id
        session_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Session Id
      type: object
      title: CustomChartsSectionsCloneRequest
    Missing:
      properties:
        __missing__:
          type: string
          const: __missing__
          title: Missing
      type: object
      required:
      - __missing__
      title: Missing
    CustomChartsRequestBase:
      properties:
        timezone:
