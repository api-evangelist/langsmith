openapi: 3.1.0
info:
  title: LangSmith access_policies model-price-map API
  description: 'The LangSmith API is used to programmatically create and manage LangSmith resources.


    ## Host

    https://api.smith.langchain.com


    ## Authentication

    To authenticate with the LangSmith API, set the `X-Api-Key` header

    to a valid [LangSmith API key](https://docs.langchain.com/langsmith/create-account-api-key#create-an-api-key).


    '
  version: 0.1.0
servers:
- url: /
tags:
- name: model-price-map
paths:
  /api/v1/model-price-map:
    get:
      tags:
      - model-price-map
      summary: Read Model Price Map
      operationId: read_model_price_map_api_v1_model_price_map_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
    post:
      tags:
      - model-price-map
      summary: Create New Model Price
      operationId: create_new_model_price_api_v1_model_price_map_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelPriceMapCreateSchema'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
  /api/v1/model-price-map/{id}:
    put:
      tags:
      - model-price-map
      summary: Update Model Price
      operationId: update_model_price_api_v1_model_price_map__id__put
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelPriceMapUpdateSchema'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - model-price-map
      summary: Delete Model Price
      operationId: delete_model_price_api_v1_model_price_map__id__delete
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ModelPriceMapCreateSchema:
      properties:
        name:
          type: string
          title: Name
        start_time:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Time
        match_path:
          items:
            type: string
          type: array
          title: Match Path
          default:
          - model
          - model_name
          - model_id
          - model_path
          - endpoint_name
        match_pattern:
          type: string
          title: Match Pattern
        prompt_cost:
          anyOf:
          - type: number
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Prompt Cost
        completion_cost:
          anyOf:
          - type: number
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Completion Cost
        prompt_cost_details:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: number
              - type: string
                pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
            type: object
          - type: 'null'
          title: Prompt Cost Details
        completion_cost_details:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: number
              - type: string
                pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
            type: object
          - type: 'null'
          title: Completion Cost Details
        provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
      type: object
      required:
      - name
      - match_pattern
      - prompt_cost
      - completion_cost
      title: ModelPriceMapCreateSchema
      description: Model price map create schema.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ModelPriceMapUpdateSchema:
      properties:
        name:
          type: string
          title: Name
        start_time:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Time
        match_path:
          items:
            type: string
          type: array
          title: Match Path
          default:
          - model
          - model_name
          - model_id
          - model_path
          - endpoint_name
        match_pattern:
          type: string
          title: Match Pattern
        prompt_cost:
          anyOf:
          - type: number
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Prompt Cost
        completion_cost:
          anyOf:
          - type: number
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Completion Cost
        prompt_cost_details:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: number
              - type: string
                pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
            type: object
          - type: 'null'
          title: Prompt Cost Details
        completion_cost_details:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: number
              - type: string
                pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
            type: object
          - type: 'null'
          title: Completion Cost Details
        provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
      type: object
      required:
      - name
      - match_pattern
      - prompt_cost
      - completion_cost
      title: ModelPriceMapUpdateSchema
      description: Model price map update schema.
  securitySchemes:
    API Key:
      type: apiKey
      in: header
      name: X-API-Key
    Tenant ID:
      type: apiKey
      in: header
      name: X-Tenant-Id
    Bearer Auth:
      type: http
      description: Bearer tokens are used to authenticate from the UI. Must also specify x-tenant-id or x-organization-id (for org scoped apis).
      scheme: bearer
    Organization ID:
      type: apiKey
      in: header
      name: X-Organization-Id
