  /v1/fleet/mcp/tools:
    get:
      security:
      - API Key: []
      - Tenant ID: []
      - Bearer Auth: []
      description: Returns tools from a remote MCP server. Serves cached results when fresh, otherwise fetches from the remote server and caches the response.
      tags:
      - fleet mcp
      summary: List MCP tools
      parameters:
      - description: MCP server URL to fetch tools from
        name: url
        in: query
        required: true
        schema:
          type: string
          title: Url
      - description: OAuth provider ID for token-based auth
        name: oauth_provider_id
        in: query
        schema:
          type: string
          title: Oauth Provider Id
      - description: Skip cache and fetch fresh tools
        name: force_refresh
        in: query
        schema:
          type: boolean
          title: Force Refresh
      - description: User ID override (service-key callers)
        name: ls_user_id
        in: query
        schema:
          type: string
          title: Ls User Id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mcptools.ListToolsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
