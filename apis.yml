aid: langsmith
url: https://raw.githubusercontent.com/api-evangelist/langsmith/refs/heads/main/apis.yml
name: LangSmith
kind: company
description: LangSmith is the observability, debugging, and evaluation platform for LLM applications, built by LangChain.
  The LangSmith API exposes tracing, dataset management, evaluation, prompt-hub, and Fleet agent functionality for AI engineering
  teams.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- AI
- LLM
- Observability
- Evaluations
- LangChain
